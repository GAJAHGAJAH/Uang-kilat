name: uang_kilat_ecommerce
description: "Uang Kilat E-Commerce - Aplikasi Merchant"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase & Authentication ───────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1

  # ── State Management ────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Networking ──────────────────────────────────────────
  dio: ^5.7.0

  # ── Navigation ──────────────────────────────────────────
  go_router: ^14.2.7

  # ── Security ────────────────────────────────────────────
  shared_preferences: ^2.3.2

  # ── Notifications ───────────────────────────────────────
  flutter_local_notifications: ^17.2.2

  # ── Deep Link (launcher/sender) ─────────────────────────
  url_launcher: ^6.3.0

  # ── UI Utilities ────────────────────────────────────────
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.12
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/